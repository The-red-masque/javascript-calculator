<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JavaScript Calculator</title>
  <link rel="stylesheet" type="text/css" href="./style.css">
</head>
<body>
  <section>
    <!-- display results -->
    <!-- Output should = /^d*\.d{9}$/ -->
  </section>
  <!-- digits and operators -->
  <section>
    <!-- bottom row -->
    <button>C</button>
    <button>0</button>
    <button>.</button>
    <!-- new row -->
    <button>1</button>
    <button>2</button>
    <button>3</button>
    <!-- new row -->
    <button>4</button>
    <button>5</button>
    <button>6</button>
    <!-- new row -->
    <button>7</button>
    <button>8</button>
    <button>9</button>
    <!-- Operators to the right in a column -->
    <button>+</button>
    <button>-</button>
    <button>*</button>
    <button>/</button>
    <button>=</button>
    
  </section>
</body>
<script src="math.js"></script>
</html>
