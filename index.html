<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JavaScript Calculator</title>
  <link rel="stylesheet" type="text/css" href="./style.css">
</head>
<body>
  <section>
    <!-- display results -->
    <!-- Output should = /^d*\.d{9}$/ -->
  </section>
  <!-- digits and operators -->
  <section>
    <!-- bottom row -->
    <div class="digit-container">
      <button>C</button>
      <button id="0key" class="number-button">0</button>
      <button id="decimalPoint" class="number-button">.</button>
      <!-- new row -->
      <button class="number-button">1</button><!-- id="1key"-->
      <button id="2key"class="number-button">2</button>
      <button id="3key"class="number-button">3</button>
      <!-- new row -->
      <button id="4key"class="number-button">4</button>
      <button id="5key"class="number-button">5</button>
      <button id="6key"class="number-button">6</button>
      <!-- new row -->
      <button id="7key"class="number-button">7</button>
      <button id="8key"class="number-button">8</button>
      <button id="9key"class="number-button">9</button>
    </div>
    <!-- Operators to the right in a column -->
    <div class="operator-container">
      <button class="operation-button">+</button>
      <button class="operation-button">-</button>
      <button class="operation-button">*</button>
      <button class="operation-button">/</button>
      <button class="operation-button">=</button>
    </div>
  </section>
</body>
<script src="calculator.js"></script>
</html>
